spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/blog_db}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:debu9733}
  jpa:
    hibernate:
      ddl-auto: update
    # show-sql: true
    properties:
      hibernate:
        format_sql: true
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
  mail:
    host: ${MAIL_HOST:smtp-relay.brevo.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:your-mail-username}
    password: ${MAIL_PASSWORD:your-mail-password}
    from: ${MAIL_FROM:no-reply@bugblogs.com}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
        debug: false

app:
  jwt:
    secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
    expiration: 86400000
  cloudinary:
    cloud-name: ${CLOUDINARY_CLOUD_NAME:your-cloud-name}
    api-key: ${CLOUDINARY_API_KEY:your-cloudinary-api-key}
    api-secret: ${CLOUDINARY_API_SECRET:your-cloudinary-api-secret}
    folder: blog-app/blog-images
